<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0a1020"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="15%" r="60%">
      <stop offset="0" stop-color="#3b82f6" stop-opacity=".22"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="30%" r="60%">
      <stop offset="0" stop-color="#22c55e" stop-opacity=".18"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <style>
      .title { font: 700 28px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: rgba(255,255,255,.92); }
      .sub { font: 500 16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: rgba(255,255,255,.72); }
      .cardT { font: 700 16px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: rgba(255,255,255,.92); letter-spacing:.2px; }
      .muted { font: 500 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: rgba(255,255,255,.72); }
      .mono { font: 600 13px/1.4 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; fill: rgba(255,255,255,.8); }
      .pillT { font: 600 13px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: rgba(255,255,255,.72); }
      .btnT { font: 700 14px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: rgba(255,255,255,.92); }
      .shadow { filter: url(#blur); }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="210" cy="90" r="360" fill="url(#glow1)"/>
  <circle cx="1020" cy="190" r="340" fill="url(#glow2)"/>

  <!-- Top bar -->
  <text x="600" y="90" text-anchor="middle" class="title">Text Moderation Console</text>
  <text x="600" y="120" text-anchor="middle" class="sub">Spam / ham classifier — FastAPI + scikit-learn</text>

  <!-- Status pill -->
  <g transform="translate(470 145)">
    <rect x="0" y="0" width="260" height="34" rx="17" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <circle cx="18" cy="17" r="6" fill="#22c55e"/>
    <text x="34" y="22" class="pillT">Model loaded (v1)</text>
  </g>

  <!-- Cards -->
  <g transform="translate(120 210)">
    <rect x="0" y="0" width="650" height="320" rx="16" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <text x="22" y="34" class="cardT">Try it</text>
    <text x="22" y="62" class="muted">Paste a message and get a prediction.</text>

    <!-- textarea -->
    <rect x="22" y="85" width="606" height="170" rx="14" fill="rgba(0,0,0,.22)" stroke="rgba(255,255,255,.14)"/>
    <text x="40" y="118" class="mono">Congratulations! You won a free prize. Call now!</text>

    <!-- button row -->
    <g transform="translate(22 270)">
      <rect x="0" y="0" width="110" height="40" rx="12" fill="rgba(59,130,246,.25)" stroke="rgba(59,130,246,.45)"/>
      <text x="55" y="26" text-anchor="middle" class="btnT">Predict</text>
      <text x="140" y="26" class="muted">Tip: press Ctrl + Enter</text>
    </g>
  </g>

  <g transform="translate(800 210)">
    <rect x="0" y="0" width="280" height="320" rx="16" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <text x="22" y="34" class="cardT">Result</text>

    <!-- result badge -->
    <g transform="translate(22 70)">
      <rect x="0" y="0" width="128" height="34" rx="17" fill="rgba(239,68,68,.12)" stroke="rgba(239,68,68,.35)"/>
      <circle cx="18" cy="17" r="6" fill="#ef4444"/>
      <text x="42" y="22" class="pillT" fill="rgba(255,255,255,.92)">SPAM</text>
      <text x="0" y="62" class="muted">Confidence: <tspan fill="rgba(255,255,255,.92)" font-weight="700">0.9912</tspan></text>
      <text x="0" y="86" class="muted">Model version: v1</text>
    </g>

    <!-- footer links -->
    <g transform="translate(22 280)">
      <text x="0" y="0" class="muted">OpenAPI docs</text>
      <text x="140" y="0" class="muted">Health JSON</text>
    </g>
  </g>
</svg>

